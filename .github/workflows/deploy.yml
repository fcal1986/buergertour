name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Inject Supabase credentials + build timestamp
        run: |
          sed -i "s|'DEINE_SUPABASE_URL'|'${{ secrets.SUPABASE_URL }}'|g" index.html
          sed -i "s|'DEIN_ANON_KEY'|'${{ secrets.SUPABASE_ANON_KEY }}'|g" index.html
          sed -i "s|__BUILD_TIME__|$(date '+%d.%m.%Y %H:%M:%S UTC')|g" index.html

      - name: Verify injection
        run: |
          if grep -q "DEINE_SUPABASE_URL" index.html; then
            echo "FEHLER: SUPABASE_URL nicht ersetzt"
            exit 1
          fi
          if grep -q "DEIN_ANON_KEY" index.html; then
            echo "FEHLER: SUPABASE_ANON_KEY nicht ersetzt"
            exit 1
          fi
          echo "URL injiziert: $(grep -oP "SUPABASE_URL\s+=\s+'[^']{0,40}" index.html)"
          echo "Key injiziert: $(grep -oP "SUPABASE_ANON\s+=\s+'[^']{0,30}" index.html)"
          echo "Build-Zeit:    $(grep -oP "Build: [^']+" index.html)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
